# ─────────────────────────────────────────────────────────────────────────────
# Supabase Function Configuration
# verify_jwt = false is required for:
#   - All admin-called functions (they validate the JWT internally via auth.getUser)
#   - All webhook receivers (Stripe, Retell) — no user JWT exists
#   - All cron/background jobs — no user JWT exists
#   - All public-facing forms — no user JWT exists
# The CLI ignores `export const config = { auth: false }` in TypeScript files.
# This config.toml is the ONLY way to set verify_jwt via the CLI.
# ─────────────────────────────────────────────────────────────────────────────

# ── Admin-facing functions ────────────────────────────────────────────────────

[functions.apply-invoice-discount]
verify_jwt = false

